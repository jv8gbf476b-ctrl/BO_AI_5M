name: BO_AI_5M_RUN

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bo-ai-5m-run
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install yfinance lightgbm pandas scikit-learn requests

      - name: Run BO_AI_5M
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Save history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase origin main

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update Market Assistant learning"
            git push origin HEAD:main
          fi

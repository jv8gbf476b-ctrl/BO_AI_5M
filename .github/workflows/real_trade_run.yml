name: BO_AI_5M_REAL

on:
  workflow_dispatch:
    inputs:
      direction:
        description: "HIGH または LOW"
        required: true
        default: "HIGH"
        type: choice
        options:
          - HIGH
          - LOW

  schedule:
    - cron: "*/1 * * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install yfinance pandas requests

      - name: Run Real Trade
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          REAL_DIRECTION: ${{ github.event.inputs.direction }}
        run: python real_trade.py

      - name: Save
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A
          git commit -m "update real trade" || echo "No changes"

          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/jv8gbf476b-ctrl/BO_AI_5M.git

          git push
